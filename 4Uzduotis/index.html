<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ramabhadra&family=Roboto:wght@100;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="dist/css/style.css">
</head>
<body>
    <div class="mainContainer">
        <div class="img">
            <img src="dist/img/mountain.jpg" alt="">
        </div>
        <div class="form">
            <h2>Login into account</h2>
            <form action="">
                <div class="input">
                    <i class="far fa-envelope"></i>
                    <input type="email" name="" id="" placeholder="Email Address">
                </div>
                <div class="input">
                    <i class="fas fa-key"></i>
                    <input type="password" name="" id="" placeholder="Password">
                </div>
                <div class="remember">
                    <input type="checkbox" name="remember" id="">
                    <label for="remember">Remember me</label>
                </div>
                <input class="login" type="submit" name="" id="" value="login">
            </form>
            <div class="forget">
                <a href="$">Forget Password?</a>
            </div>
            <h3>or login with</h3>
            <div class="logoContainer">
                <div class="logo facebook">
                    <a class="facebook" href="http://www.facebook.com">facebook</a>
                </div>
                <div class="logo google">
                    <a class="google" href="http://www.google.com">google</a>
                </div>
                <div class="logo twitter">
                    <a class="twitter" href="http://www.twitter.com">twitter</a>
                </div>
            </div>
            <div class="footer">
                <span>Don't have an account?</span> <a href="#">Register here</a>
            </div>
        </div>
    </div>
</body>
</html>
